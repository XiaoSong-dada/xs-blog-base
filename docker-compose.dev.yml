services:
  migrate:
    build:
      context: ./xs-blog-server
    container_name: xs-blog-migrate
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-xs_blog_user}:${POSTGRES_PASSWORD:-change_me}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-xs_blog}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change_me_redis}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis}
      REDIS_PREFIX: ${REDIS_PREFIX:-blog}
      SECRET_KEY: ${SECRET_KEY:-change_me_secret}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-300}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-xs_blog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-xs_blog}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost"]}
      FILE_STORAGE_PATH: ${FILE_STORAGE_PATH:-./storage}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.qq.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_CODE: ${EMAIL_CODE:-change_me_mail_auth_code}
      EMAIL_SENDER: ${EMAIL_SENDER:-example@qq.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-xs-blog}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: alembic upgrade head

  api:
    build:
      context: ./xs-blog-server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./xs-blog-server:/app
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./xs-blog-web
      dockerfile: Dockerfile.dev
    container_name: xs-blog-web-dev
    environment:
      VITE_API_REQUEST_MODE: ${VITE_API_REQUEST_MODE:-direct}
      VITE_BACKEND_API_URL: ${VITE_BACKEND_API_URL:-http://localhost:${API_PUBLISH_PORT:-26888}/api}
      # Ensure pnpm runs non-interactively inside containers (avoid TTY prompt)
      CI: 'true'
      # Optional: prevent pnpm from asking to confirm removing node_modules
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: 'false'
      VITE_STATIC_URL: ${VITE_STATIC_URL:-http://localhost:${API_PUBLISH_PORT:-26888}/static/}
      VITE_VDITOR_CDN: ${VITE_VDITOR_CDN:-/vditor}
      VITE_SITE_NAME: ${VITE_SITE_NAME:-xs-blog}
      VITE_SITE_ICP: ${VITE_SITE_ICP:-}
      VITE_SITE_ICP_LINK: ${VITE_SITE_ICP_LINK:-}
      VITE_GITHUB_REPO: ${VITE_GITHUB_REPO:-xs-blog}
      VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-https://github.com/your-name/xs-blog}
      VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://localhost:${API_PUBLISH_PORT:-26888}}
      VITE_BACKEND_STATIC: ${VITE_BACKEND_STATIC:-static}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_DEV_PUBLISH_PORT:-25173}:5173"
    volumes:
      - ./xs-blog-web:/app
      - xs_blog_web_node_modules:/app/node_modules
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0 --port 5173"

volumes:
  xs_blog_web_node_modules: